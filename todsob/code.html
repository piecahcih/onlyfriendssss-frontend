<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#611b79",
                        "inverse-surface": "#240304",
                        "inverse-on-surface": "#ce8c89",
                        "primary-dim": "#942a00",
                        "on-secondary-container": "#852327",
                        "on-tertiary-fixed": "#360049",
                        "on-primary-container": "#460f00",
                        "on-surface-variant": "#834c4b",
                        "on-error-container": "#570008",
                        "error": "#b31b25",
                        "surface-bright": "#fff4f3",
                        "on-tertiary-container": "#570e6f",
                        "surface": "#fff4f3",
                        "primary-fixed": "#ff784c",
                        "tertiary-fixed-dim": "#d88cee",
                        "secondary-fixed-dim": "#ffafac",
                        "on-secondary-fixed-variant": "#922d2f",
                        "outline": "#a26765",
                        "tertiary-container": "#e699fd",
                        "inverse-primary": "#ff5717",
                        "secondary": "#a03739",
                        "surface-variant": "#ffd2d0",
                        "secondary-dim": "#902c2e",
                        "on-background": "#4e2120",
                        "background": "#fff4f3",
                        "on-primary": "#ffefeb",
                        "error-container": "#fb5151",
                        "tertiary-dim": "#76318d",
                        "outline-variant": "#e09c99",
                        "primary-container": "#ff784c",
                        "surface-tint": "#a83100",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#ffedeb",
                        "surface-container-highest": "#ffd2d0",
                        "on-surface": "#4e2120",
                        "surface-container-high": "#ffdad8",
                        "surface-container": "#ffe1e0",
                        "tertiary-fixed": "#e699fd",
                        "on-primary-fixed-variant": "#561500",
                        "on-secondary-fixed": "#6a0e16",
                        "secondary-fixed": "#ffc3c0",
                        "error-dim": "#9f0519",
                        "primary": "#a83100",
                        "primary-fixed-dim": "#ff5d24",
                        "on-primary-fixed": "#000000",
                        "secondary-container": "#ffc3c0",
                        "on-secondary": "#ffefee",
                        "surface-dim": "#ffc7c4",
                        "on-tertiary": "#ffedfe",
                        "on-error": "#ffefee",
                        "tertiary": "#833e9a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Bai Jamjuree"],
                        "body": ["Bai Jamjuree"],
                        "label": ["Bai Jamjuree"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Bai Jamjuree', sans-serif;
            background-color: #FBF9F6;
            color: #4e2120;
        }
        .headline-text {
            font-family: 'Bai Jamjuree', sans-serif;
        }
        .no-scrollbar {
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .tonal-shift-no-borders {
            border: none !important;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="min-h-screen" style="background-color: #FBF9F6;">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 dark:bg-stone-950 shadow-[0_8px_32px_rgba(78,33,32,0.08)] dark:shadow-none tonal-shift-no-borders flex items-center px-6 py-4 w-full bg-[#FBF9F6]">
<div class="flex items-center gap-4">
<button class="text-[#a83100] dark:text-[#ff784c] hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Bai_Jamjuree'] tracking-[-0.02em] font-bold text-[1.75rem] text-[#4e2120] dark:text-stone-100">Create Activity</h1>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-8 space-y-8">
<!-- Hero Section/Image Upload -->
<section class="relative group">
<div class="w-full h-56 rounded-lg overflow-hidden bg-surface-container-high relative">
<img alt="Activity Cover" class="w-full h-full object-cover opacity-80" data-alt="a group of friends laughing and enjoying a sunny afternoon in a lush green park with picnic blankets and soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqEw2q8gkMcCj8DSotqZOrmkwjuoABmpXLuohb4kPP-H_xCBRdsdznmt7NuxMN4b8Oo-FmIMq3qKF50ObGJzg52nhtI8cum2X0JKmYyC_bt9KxOfHUedBBVx8x5rizD6gsuX7OwmIf-E7uO0XcXpCBiYSEwn-EpLzWVVF-bcpLGwG19xFeCaUr2nPeGBLykw2WLgDvE1EIJGtPhT2ihGK5l7OjE5U4r7K6u2h8WJFUbw2YG2bHmYX4nSNISTSclbfUAuHGTPg-JP12"/>
<div class="absolute inset-0 flex flex-col items-center justify-center bg-on-surface/10 backdrop-blur-sm transition-all group-hover:backdrop-blur-none">
<div class="bg-surface-container-lowest/90 p-4 rounded-full shadow-lg cursor-pointer active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="mt-3 font-label text-sm font-semibold text-on-surface">Add Cover Photo</span>
</div>
</div>
</section>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Activity Name -->
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface-variant flex items-center gap-2">
                    Activity Name
                </label>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl">✏️</span>
<input class="w-full pl-14 pr-6 py-4 rounded-full bg-surface-container-lowest border-none ring-2 ring-outline-variant/20 focus:ring-primary focus:ring-2 transition-all outline-none font-body text-on-surface placeholder:text-on-surface-variant/40" placeholder="Morning Hiking in the Hills" type="text"/>
</div>
</div>
<!-- Public Badge / Privacy -->
<div class="flex items-center justify-between p-5 rounded-lg bg-surface-container-low">
<div class="flex items-center gap-3">
<span class="text-2xl">🌎</span>
<div>
<p class="font-title font-bold text-on-surface">Public Activity</p>
<p class="font-label text-xs text-on-surface-variant">Visible to everyone in the community</p>
</div>
</div>
<div class="w-12 h-6 bg-primary rounded-full relative cursor-pointer">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</div>
<!-- Location -->
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface-variant">Location</label>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl">📍</span>
<input class="w-full pl-14 pr-6 py-4 rounded-full bg-surface-container-lowest border-none ring-2 ring-outline-variant/20 focus:ring-primary transition-all outline-none font-body text-on-surface" placeholder="Central Park, New York" type="text"/>
</div>
<div class="w-full h-32 mt-3 rounded-lg overflow-hidden grayscale brightness-95 opacity-80">
<img alt="Map snippet" class="w-full h-full object-cover" data-alt="a minimalist topographic map style showing city streets and a park in warm beige and terracotta tones" data-location="New York City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPfhKMwa-5XOrbeWnnmM-FuuFAveQ5O3WXcVxLMxv5vcalHwzoZn_r-34v7SiXlcFHX3klvs6wHllC0UGhnywo4FFzs1M33QYgP1u437uJ5tDE8SUNjUKqAw1GCkhYCDpegc5vSZZhsPy4Oyqtgd6UYdBxzDP-xIBSNOXrNAN0690VS9Kw9tV7r0X-FUmF_1W-tFI93IwqypVMuxIuPQafXspSvqftgaaZ2ZwtJ8r30tm90v7Vlbz7WzHXqiPKNKeyGfs5-jH9TUQe"/>
</div>
</div>
<!-- Date & Time Row -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface-variant">Date</label>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl">📅</span>
<input class="w-full pl-14 pr-4 py-4 rounded-full bg-surface-container-lowest border-none ring-2 ring-outline-variant/20 focus:ring-primary transition-all outline-none font-body text-on-surface text-sm" placeholder="Oct 24, 2023" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface-variant">Time</label>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<input class="w-full pl-14 pr-4 py-4 rounded-full bg-surface-container-lowest border-none ring-2 ring-outline-variant/20 focus:ring-primary transition-all outline-none font-body text-on-surface text-sm" placeholder="08:30 AM" type="text"/>
</div>
</div>
</div>
<!-- Category Chips -->
<div class="space-y-3">
<label class="font-label text-sm font-bold text-on-surface-variant flex items-center gap-2">
<span>🏷️</span> Category
                </label>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-md bg-primary-container text-on-primary-container font-label text-sm font-medium flex items-center gap-2 transition-all" type="button">
<span>💪</span> Health
                    </button>
<button class="px-5 py-2 rounded-md bg-surface-container-high text-on-surface-variant font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-highest transition-all" type="button">
<span>🎭</span> Entertainment
                    </button>
<button class="px-5 py-2 rounded-md bg-surface-container-high text-on-surface-variant font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-highest transition-all" type="button">
<span>🎨</span> Art
                    </button>
<button class="px-5 py-2 rounded-md bg-surface-container-high text-on-surface-variant font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-highest transition-all" type="button">
<span>🍱</span> Food
                    </button>
<button class="px-5 py-2 rounded-md bg-surface-container-high text-on-surface-variant font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-highest transition-all" type="button">
<span>✈️</span> Travel
                    </button>
</div>
</div>
<!-- Notes -->
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface-variant">Notes</label>
<div class="relative">
<span class="absolute left-5 top-6 text-xl">📝</span>
<textarea class="w-full pl-14 pr-6 py-5 rounded-lg bg-surface-container-lowest border-none ring-2 ring-outline-variant/20 focus:ring-primary transition-all outline-none font-body text-on-surface placeholder:text-on-surface-variant/40 resize-none" placeholder="Tell us more about the activity, what to bring, and expectations..." rows="4"></textarea>
</div>
</div>
</form>
<!-- Main CTA -->
<div class="pt-4 pb-12">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg shadow-[0_8px_32px_rgba(168,49,0,0.24)] active:scale-95 transition-all">
                Create Activity
            </button>
</div>
</main>
</body></html>
