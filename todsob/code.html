<body class="text-on-surface antialiased min-h-screen flex flex-col" style="background-color: #FBF9F6;">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 shadow-none" style="background-color: #FBF9F6;">
<div class="flex justify-between items-center px-6 py-4 w-full h-16">
<div class="flex items-center gap-4">
<h1 class="font-['Plus_Jakarta_Sans'] tracking-[-0.02em] font-bold text-[#4e2120] dark:text-[#fff4f3] text-lg">Choose location</h1>
</div>
<button class="text-[#a83100] dark:text-[#ff784c] active:scale-95 duration-200 hover:bg-[#ff784c]/10 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full flex flex-col gap-8">
<!-- Search Bar -->
<section class="w-full">
<div class="relative group"><div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary-container" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-lowest border-none outline-none focus:ring-2 focus:ring-primary h-16 pl-14 pr-14 rounded-full font-custom text-lg shadow-[0_4px_24px_rgba(78,33,32,0.04)] transition-all placeholder:text-on-surface/40" placeholder="Search" type="text"/>
<div class="absolute inset-y-0 right-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface/40" data-icon="mic">mic</span>
</div></div>
</section>
<!-- Map Container -->
<section class="flex-grow flex flex-col gap-6">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden shadow-[0_12px_48px_rgba(78,33,32,0.1)] border-4 border-surface-container-lowest">
<!-- Map Placeholder -->
<div class="w-full h-full bg-surface-container-high relative">
<img alt="Interactive map view of a sunlit urban coastal city" class="w-full h-full object-cover" data-alt="stylized minimalist map view of a coastal city with soft warm aesthetic, pastel roads, and gentle blue water during golden hour" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida/ADBb0ujHwHlyISeN8VLLSWSmF3U-UsuXTQJX3FlpfmRuDj2-8LssbuVAg8lMxOy4nH4UhiL_gRF843Udv9win7l2ojkVajFwYM7tdhyUzJfHyPKE0JHhGLCphThtdMCNST_1E0mpqABWkNioDkwMO-_pVSezAhPJEB6pcPNifws11y_1dkWVHsH2vZraGqPK3VVKbVlsr_CzlHH6MlRuTy3MaVVGH47xvlQf3ZgJHTM5TjpVjvTTFxXC5CWAwwRaZvAaksdZ8ld_tIOy6S4"/>
<!-- Pulsing Pin Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-[#fc5100]/20 rounded-full border-2 border-[#fc5100]/30"></div><div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-12 h-12 flex items-center justify-center rounded-full shadow-lg" style="background-color: #fc5100; box-shadow: 0 0 0 8px rgba(252, 81, 0, 0.2);">
<span class="material-symbols-outlined text-white text-3xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="mt-2 px-4 py-2 glass-panel rounded-full shadow-sm">
<span class="font-custom font-semibold text-sm" style="color: #fc5100;">Sun Peak District</span>
</div>
</div>
<!-- Map Controls -->
</div>
</div>
<!-- Descriptive Text -->
<div class="text-center">
<p class="font-custom text-on-surface/60 text-lg">Choose a general area</p>
</div>
</section>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-4 bg-gradient-to-t from-[#FBF9F6] via-[#FBF9F6]/90 to-transparent">
